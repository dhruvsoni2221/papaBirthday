<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Dad!</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fireworks-js@2.x/dist/index.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <style>
        :root {
            --gold: #FFD700;
            --gold-dark: #C5A059;
            --bg-color: #000000;
            /* Pure AMOLED Black */
            --accent-color: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Removed the gradient for 100% black consistency */
            background: var(--bg-color);
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.8));
        }

        /* Glassmorphism Card with Gradient Border */
        .card-wrapper {
            position: relative;
            z-index: 10;
            padding: 3px;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.4), rgba(255, 215, 0, 0.1), rgba(255, 215, 0, 0));
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            animation: float 6s ease-in-out infinite;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            /* Subtle glass feel on black */
            backdrop-filter: blur(28px) saturate(200%);
            -webkit-backdrop-filter: blur(28px) saturate(200%);
            border-radius: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 215, 0, 0.05);
            border-bottom: 1px solid rgba(255, 215, 0, 0.05);
            padding: 50px 40px;
            text-align: center;
            width: 90vw;
            max-width: 500px;
            box-shadow:
                0 25px 45px rgba(0, 0, 0, 0.8),
                inset 0 0 20px rgba(255, 255, 255, 0.02);
            transform-style: preserve-3d;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .card h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #FFF, var(--gold), #FFF);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            transform: translateZ(50px);
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        .card p {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #efefef;
            margin-bottom: 40px;
            transform: translateZ(30px);
            min-height: 80px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 1);
        }

        .btn {
            position: relative;
            background: linear-gradient(45deg, var(--gold-dark), var(--gold));
            color: #000;
            border: none;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
            transform: translateZ(40px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateZ(40px) scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.5);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            transition: all 0.5s ease;
        }

        .btn:hover::after {
            left: 100%;
        }

        .crown {
            font-size: 3.5rem;
            margin-bottom: 5px;
            display: inline-block;
            transform: translateZ(60px);
            animation: bounce 2s infinite;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6));
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateZ(60px) translateY(0);
            }

            40% {
                transform: translateZ(60px) translateY(-15px);
            }

            60% {
                transform: translateZ(60px) translateY(-7px);
            }
        }

        @keyframes fadeInPhoto {
            from {
                opacity: 0;
                transform: translateZ(40px) scale(0.8);
            }

            to {
                opacity: 1;
                transform: translateZ(40px) scale(1);
            }
        }

        #collage-container {
            display: none;
            width: 100%;
            padding-top: 20px;
            padding-bottom: 40px;
            margin-top: -10px;
            transform: translateZ(40px);
        }

        .swiper-slide {
            background-position: center;
            background-size: cover;
            width: 280px;
            height: 280px;
        }

        .collage-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
            border: 3px solid var(--gold);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.8);
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .card {
                padding: 30px 20px;
                width: 95vw;
            }

            .card h1 {
                font-size: 2.2rem;
            }

            .card p {
                font-size: 1rem;
                min-height: 130px;
            }

            .crown {
                font-size: 2.5rem;
            }

            .swiper-slide {
                width: 240px;
                height: 240px;
            }

            .btn {
                padding: 14px 25px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>

    <div id="particles-js"></div>

    <div id="fireworks-container"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;"></div>

    <div class="card-wrapper" data-tilt data-tilt-max="10" data-tilt-speed="400" data-tilt-glare="true"
        data-tilt-max-glare="0.2" data-tilt-scale="1.05">
        <div class="card">
            <div class="crown">👑</div>
            <h1>Happy 45th<br>Birthday Papa</h1>
            <p id="message"></p>
            <div id="collage-container" class="swiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="Photos-3-001/1.jpg" class="collage-photo" alt="Photo 1"></div>
                    <div class="swiper-slide"><img src="Photos-3-001/2.jpg" class="collage-photo" alt="Photo 2"></div>
                    <div class="swiper-slide"><img src="Photos-3-001/3.jpg" class="collage-photo" alt="Photo 3"></div>
                    <div class="swiper-slide"><img src="Photos-3-001/4.jpg" class="collage-photo" alt="Photo 4"></div>
                    <div class="swiper-slide"><img src="Photos-3-001/5.jpg" class="collage-photo" alt="Photo 5"></div>
                    <div class="swiper-slide"><img src="Photos-3-001/6.jpg" class="collage-photo" alt="Photo 6"></div>
                    <div class="swiper-slide"><img src="Photos-3-001/7.jpg" class="collage-photo" alt="Photo 7"></div>
                    <div class="swiper-slide"><img src="Photos-3-001/8.jpg" class="collage-photo" alt="Photo 8"></div>
                    <div class="swiper-slide"><img src="Photos-3-001/9.jpg" class="collage-photo" alt="Photo 9"></div>
                    <div class="swiper-slide"><img src="Photos-3-001/10.jpg" class="collage-photo" alt="Photo 10"></div>
                    <div class="swiper-slide"><img src="Photos-3-001/11.jpg" class="collage-photo" alt="Photo 11"></div>
                    <div class="swiper-slide"><img src="Photos-3-001/12.jpg" class="collage-photo" alt="Photo 12"></div>
                    <div class="swiper-slide"><img src="Photos-3-001/13.jpg" class="collage-photo" alt="Photo 13"></div>
                </div>
                <div class="swiper-pagination"></div>
            </div>

            <audio id="bdayMusic" src="birthday.mp3"></audio>
            <button class="btn" id="celebrateBtn" onclick="megaCelebrate()">CELEBRATE 🎊</button>
        </div>
    </div>

    <script>
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#FFD700" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": true, "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false } },
                "size": { "value": 4, "random": true, "anim": { "enable": false, "speed": 40, "size_min": 0.1, "sync": false } },
                "line_linked": { "enable": true, "distance": 150, "color": "#FFD700", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 1.5, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" },
                    "onclick": { "enable": true, "mode": "push" },
                    "resize": true
                },
                "modes": {
                    "grab": { "distance": 140, "line_linked": { "opacity": 0.5 } },
                    "push": { "particles_nb": 4 }
                }
            },
            "retina_detect": true
        });

        const text = "Wishing the greatest Papa in the world a very Happy 45th Birthday! 🎉 45 years of making the world a better place. You are my hero! ❤️ I hope this surprise brings a smile to your face today. Enjoy your day!";
        const messageEl = document.getElementById('message');
        let i = 0;

        function typeWriter() {
            if (i < text.length) {
                messageEl.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }
        setTimeout(typeWriter, 800);

        let dodgeCount = 0;
        const btn = document.getElementById('celebrateBtn');
        const prankTexts = [
            "TOO SLOW! 😂",
            "NICE TRY! 🏃‍♂️💨",
            "ALMOST! 👀",
            "LAST TIME, I PROMISE 🤞",
            "THIS TIME FINAL! 😁",
            "Paaku ek last vaar cilck karo"
        ];

        function dodgeButton(e) {
            if (dodgeCount < 6) {
                if (e && e.type === 'touchstart') e.preventDefault();
                const isMobile = window.innerWidth <= 600;
                const rangeX = isMobile ? 120 : 200;
                const rangeY = isMobile ? 80 : 150;
                const x = (Math.random() * rangeX) - (rangeX / 2);
                const y = (Math.random() * rangeY) - (rangeY / 2);

                btn.style.transform = `translate3d(${x}px, ${y}px, 40px)`;
                btn.innerText = prankTexts[dodgeCount];
                dodgeCount++;
            } else if (dodgeCount === 6) {
                btn.style.transform = `translate3d(0px, 0px, 40px)`;
                btn.innerText = "OKAY YOU CAUGHT ME! 🎊 CLICK ME!";
                dodgeCount++;
            }
        }

        btn.addEventListener('mouseover', dodgeButton);
        btn.addEventListener('touchstart', dodgeButton, { passive: false });

        function megaCelebrate() {
            document.getElementById('message').style.display = 'none';
            const collageEl = document.getElementById('collage-container');
            collageEl.style.display = 'block';
            collageEl.style.animation = 'fadeInPhoto 1.5s ease-out forwards';

            var swiper = new Swiper('.swiper', {
                effect: 'coverflow',
                grabCursor: true,
                centeredSlides: true,
                slidesPerView: 'auto',
                coverflowEffect: {
                    rotate: 40,
                    stretch: 0,
                    depth: 150,
                    modifier: 1,
                    slideShadows: true,
                },
                loop: true,
                speed: 1000,
                autoplay: {
                    delay: 1500,
                    disableOnInteraction: false,
                },
                pagination: {
                    el: '.swiper-pagination',
                    clickable: true,
                },
            });

            const audioEl = document.getElementById('bdayMusic');
            audioEl.currentTime = 23;
            audioEl.play().catch(e => console.log("Audio fail:", e));

            btn.style.display = 'none';

            const fwContainer = document.getElementById('fireworks-container');
            const FireworksConstructor = typeof Fireworks === 'function' ? Fireworks : (window.Fireworks.default || window.Fireworks);
            const fireworks = new FireworksConstructor(fwContainer, {
                autoresize: true,
                opacity: 0.9,
                acceleration: 1.02,
                friction: 0.98,
                gravity: 0.8,
                particles: 150,
                traceLength: 3,
                traceSpeed: 3,
                explosion: 10,
                intensity: 40,
                flickering: 50,
                hue: { min: 15, max: 45 },
                delay: { min: 35, max: 70 },
                brightness: { min: 60, max: 90 },
                decay: { min: 0.015, max: 0.03 }
            });

            fireworks.start();
        }
    </script>
</body>

</html>
